<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トランプ＆スマホ風アプリ</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #2c3e50; }
        .section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover { background: #2980b9; }
        .result-box {
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🃏 対戦・レート管理ツール</h2>

    <!-- 設定エリア -->
    <div class="section">
        <label for="currentRate">GM初期レート（現在値）:</label>
        <input type="number" id="currentRate" placeholder="例: 1500">

        <label for="firstOrSecond">先手 / 後手:</label>
        <select id="firstOrSecond">
            <option value="first">先手</option>
            <option value="second">後手</option>
        </select>

        <label for="matchResult">試合結果:</label>
        <select id="matchResult">
            <option value="win">勝ち</option>
            <option value="lose">負け</option>
        </select>

        <button onclick="recordMatch()">試合結果を記録する</button>
    </div>

    <!-- 相性分析・戦績表示エリア -->
    <div class="section result-box">
        <h3>📊 相性分析・戦績</h3>
        <p id="totalScore">トータル: 0勝 0敗 (勝率: 0%)</p>
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
        <p id="firstScore">【先手時】 0勝 0敗 (勝率: 0%)</p>
        <p id="secondScore">【後手時】 0勝 0敗 (勝率: 0%)</p>
    </div>
</div>

<script>
    // データの読み込み（ローカルストレージから復元）
    let stats = JSON.parse(localStorage.getItem('matchStats')) || {
        totalWin: 0,
        totalLose: 0,
        firstWin: 0,
        firstLose: 0,
        secondWin: 0,
        secondLose: 0,
        lastRate: 1500
    };

    // 起動時に保存されていたレートを反映
    window.onload = function() {
        document.getElementById('currentRate').value = stats.lastRate;
        updateDisplay();
    };

    // 試合結果を記録する関数
    function recordMatch() {
        const rateInput = document.getElementById('currentRate').value;
        const position = document.getElementById('firstOrSecond').value;
        const result = document.getElementById('matchResult').value;

        if (rateInput) {
            stats.lastRate = Number(rateInput);
        }

        // 勝敗のカウント
        if (result === 'win') {
            stats.totalWin++;
            if (position === 'first') stats.firstWin++;
            else stats.secondWin++;
        } else {
            stats.totalLose++;
            if (position === 'first') stats.firstLose++;
            else stats.secondLose++;
        }

        // ローカルストレージに保存（ブラウザを閉じても消えないようにする）
        localStorage.setItem('matchStats', JSON.stringify(stats));

        // 画面の表示を更新
        updateDisplay();
        alert('試合結果を記録しました！');
    }

    // 画面の数字を計算して描画する関数
    function updateDisplay() {
        // トータル勝率計算
        const totalGames = stats.totalWin + stats.totalLose;
        const totalRate = totalGames > 0 ? ((stats.totalWin / totalGames) * 100).toFixed(1) : 0;
        document.getElementById('totalScore').innerText = 
            `トータル: ${stats.totalWin}勝 ${stats.totalLose}敗 (勝率: ${totalRate}%)`;

        // 先手勝率計算
        const firstGames = stats.firstWin + stats.firstLose;
        const firstRate = firstGames > 0 ? ((stats.firstWin / firstGames) * 100).toFixed(1) : 0;
        document.getElementById('firstScore').innerText = 
            `【先手時】 ${stats.firstWin}勝 ${stats.firstLose}敗 (勝率: ${firstRate}%)`;

        // 後手勝率計算
        const secondGames = stats.secondWin + stats.secondLose;
        const secondRate = secondGames > 0 ? ((stats.secondWin / secondGames) * 100).toFixed(1) : 0;
        document.getElementById('secondScore').innerText = 
            `【後手時】 ${stats.secondWin}勝 ${stats.secondLose}敗 (勝率: ${secondRate}%)`;
    }
</script>

</body>
</html>
